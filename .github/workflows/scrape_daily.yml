name: Daily Data Scrape & Ingestion

on:
  schedule:
    # 10:00 AM IST corresponds to 04:30 AM UTC
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run full ingestion pipeline
        run: |
          python -m ingest.build_index
          
      - name: Commit and push updated Vector DB and data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Force add the data directory to include vector DB updates
          git add -f data/
          
          # Only commit if there are changes
          git diff --staged --quiet || (git commit -m "chore: Daily vector DB update" && git push)
